rss_feeds:
  grants_gov_rss:
    name: "Grants.gov RSS"
    type: rss
    url: "https://www.grants.gov/rss/GG_NewOppByCategory.xml"
    parser: rss
    priority: 2
    enabled: true

  sam_gov_rss:
    name: "SAM.gov RSS"
    type: rss
    url: "https://sam.gov/api/prod/opps/v1/rss"
    parser: rss
    priority: 2
    enabled: false
    notes: "May require specific parameters"

web_search:
  google_search:
    name: "Google Custom Search"
    type: web_search
    enabled: true
    priority: 2
    notes: "Fallback for sources without APIs. Uses Google CSE if key available, otherwise web search tool."

  targeted_searches:
    name: "Targeted Web Searches"
    type: web_search
    enabled: true
    priority: 2
    search_templates:
      - "{keyword} funding opportunity 2025 2026"
      - "{keyword} grant call for proposals"
      - "{keyword} BAA broad agency announcement"
      - "{keyword} research funding university center"
      - "site:grants.gov {keyword}"
      - "site:sam.gov {keyword}"
      - "{keyword} foundation grant security policy"
