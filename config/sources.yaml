web_search:
  google_search:
    name: "Google Custom Search"
    type: web_search
    enabled: true
    priority: 2
    notes: "Fallback for sources without APIs. Uses Google CSE if key available."

  targeted_searches:
    name: "Targeted Web Searches"
    type: web_search
    enabled: true
    priority: 2
    search_templates:
      - "{keyword} funding opportunity 2025 2026"
      - "{keyword} grant call for proposals open"
      - "{keyword} BAA broad agency announcement 2025"
      - "{keyword} research funding university center 2025"
      - "{keyword} fellowship application open 2025 2026"
      - "site:grants.gov {keyword}"
      - "site:sam.gov {keyword}"
      - "{keyword} foundation grant security policy"
      - "{keyword} cooperative agreement NOFO 2025"
