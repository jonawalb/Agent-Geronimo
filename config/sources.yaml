# Agent Geronimo - Source Registry
# Each source has a type, URL pattern, parser class, and priority

federal_apis:
  grants_gov:
    name: "Grants.gov"
    type: api
    base_url: "https://api.grants.gov/v1/api"
    search_url: "https://api.grants.gov/v1/api/search"
    detail_url: "https://api.grants.gov/v1/api/listing"
    parser: grants_gov
    priority: 1
    enabled: true
    rate_limit: 2  # requests per second
    notes: "Primary federal grant database. No API key needed for basic search."

  sam_gov:
    name: "SAM.gov Contract Opportunities"
    type: api
    base_url: "https://api.sam.gov/prod/opportunities/v2/search"
    parser: sam_gov
    priority: 1
    enabled: true
    requires_key: true
    key_env: SAM_GOV_API_KEY
    rate_limit: 1
    notes: "Federal contract opportunities. Free API key from api.sam.gov"

  usaspending:
    name: "USAspending.gov"
    type: api
    base_url: "https://api.usaspending.gov/api/v2"
    parser: usaspending
    priority: 2
    enabled: true
    notes: "Past award data for funder intelligence. Public API, no key needed."

